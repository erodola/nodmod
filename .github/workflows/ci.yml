name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run CI-safe test scripts
        shell: bash
        run: |
          set -euo pipefail

          tests=(
            dev/test_ascii_api.py
            dev/test_coordinate_api_consistency.py
            dev/test_effect_codec.py
            dev/test_helpers.py
            dev/test_mod_basic.py
            dev/test_mod_pcm_helpers.py
            dev/test_mod_restart_position.py
            dev/test_mod_sample_api.py
            dev/test_modnote_alias.py
            dev/test_note_editing.py
            dev/test_plan_api.py
            dev/test_probe_api.py
            dev/test_s3m_timing_functions.py
            dev/test_song_base.py
            dev/test_types_basic.py
            dev/test_views_api.py
            dev/test_xm_basic.py
            dev/test_xm_copy_instrument.py
            dev/test_xm_instrument_api.py
            dev/test_xm_instrument_raw.py
            dev/test_xm_instruments.py
            dev/test_xm_sample_io.py
          )

          for t in "${tests[@]}"; do
            echo "Running $t"
            python "$t"
          done
